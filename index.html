<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3301</title>
    <style>
    
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: monospace;
        }

        
        .image-container {
            max-width: 90%;
            max-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        
        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            user-select: none; 
            -webkit-user-drag: none; 
        }
    </style>
</head>
<body>

    <div class="image-container">
        
        <img src="start.jpg" alt="13">
    </div>

</body>
</html>
